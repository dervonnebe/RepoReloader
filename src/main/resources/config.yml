# =============================================================
#  RepoReloader – Konfiguration
# =============================================================

# GitHub Personal Access Token
#
# Token erstellen unter: https://github.com/settings/tokens/new
#
# Benötigte Berechtigungen:
#   Öffentliche Repos  -> kein Scope erforderlich (Token erhöht nur das Rate-Limit)
#   Private Repos      -> "Contents" (Read-only) bei Classic Tokens
#                        "Repository contents" (Read-only) bei Fine-grained Tokens
#
# Token NIEMALS ins Versions-Control einchecken!
github-token: ""

# =============================================================
#  Globales Pruefintervall
# =============================================================
# Wie oft nach neuen Releases gesucht wird (in Minuten).
# Kann pro Repository individuell ueberschrieben werden (siehe unten).
check-interval-minutes: 30

# =============================================================
#  Nachrichten (MiniMessage-Format)
# =============================================================
# Dokumentation: https://docs.advntr.dev/minimessage/format.html
#
# Verfuegbare Platzhalter:
#   {repo}   - owner/repo, z. B. "DeinName/GeheimesPlugin"
#   {old}    - aktuell installierte Plugin-Version
#   {new}    - neue Version im GitHub-Release
#   {file}   - Dateiname der heruntergeladenen .update-Datei
#   {error}  - Fehlermeldung (nur bei download-failed verfuegbar)
messages:
  # Automatische Update-Benachrichtigungen (Platzhalter: {repo}, {old}, {new}, {file})
  update-found: "<green>[RepoReloader]</green> Update fuer <aqua>{repo}</aqua> gefunden (<red>{old}</red> <gray>-></gray> <green>{new}</green>) - <yellow>{file}</yellow> heruntergeladen. Neustart erforderlich."
  # Fehler beim Download (Platzhalter: {repo}, {error})
  download-failed: "<red>[RepoReloader]</red> <white>Download fehlgeschlagen fuer <aqua>{repo}</aqua>: {error}</white>"

  # Kommando-Nachrichten (/rr check)
  # Platzhalter: {count}
  cmd-check-all: "<green>[RepoReloader]</green> Force-Check gestartet fuer <white>{count}</white> Repositories..."
  # Platzhalter: {repo}
  cmd-check-one: "<green>[RepoReloader]</green> Force-Check gestartet fuer <aqua>{repo}</aqua>..."
  # Platzhalter: {repo}
  cmd-repo-not-found: "<red>[RepoReloader]</red> Repository <aqua>{repo}</aqua> nicht in der Konfiguration gefunden."
  cmd-not-initialized: "<red>[RepoReloader]</red> Plugin nicht initialisiert (Token oder Repositories fehlen)."
  cmd-no-permission: "<red>[RepoReloader]</red> Du hast keine Berechtigung fuer diesen Befehl."
  cmd-usage: "<gray>[RepoReloader]</gray> Verwendung: <white>/rr check [owner/repo]</white>"

# =============================================================
#  Repositories
# =============================================================
# Jeder Eintrag beschreibt ein GitHub-Repository, dessen neuesten
# Release dieser Plugin ueberwacht und automatisch herunterlaed.
#
# Pflichtfelder:
#   owner          - GitHub-Benutzername oder Organisation
#   repo           - Repository-Name
#   local-filename - Dateiname des JARs im plugins/-Ordner
#
# Optionales Feld:
#   check-interval-minutes - Ueberschreibt das globale Intervall fuer
#                            dieses Repository (min. 1 Minute)
repositories:
  - owner: "DeinName"
    repo: "GeheimesPlugin"
    local-filename: "GeheimesPlugin.jar"
    # check-interval-minutes: 10

  - owner: "AndererUser"
    repo: "UtilityPlugin"
    local-filename: "Utility.jar"
    # check-interval-minutes: 60
